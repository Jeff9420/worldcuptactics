<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#0d2016"/>
      <stop offset="100%" stop-color="#040C06"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Pitch outline (decorative, faint) -->
  <rect x="60" y="80" width="280" height="240" rx="6"
        fill="none" stroke="#2DFF7C" stroke-width="1.5" stroke-opacity="0.15"/>
  <!-- Center line -->
  <line x1="60" y1="200" x2="340" y2="200"
        stroke="#2DFF7C" stroke-width="1.2" stroke-opacity="0.12"/>
  <!-- Center circle -->
  <circle cx="200" cy="200" r="50"
          fill="none" stroke="#2DFF7C" stroke-width="1.2" stroke-opacity="0.12"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#2DFF7C" fill-opacity="0.2"/>

  <!-- Top accent bar -->
  <rect x="60" y="80" width="280" height="3" rx="1.5" fill="#2DFF7C" fill-opacity="0.6"/>

  <!-- WCT lettering -->
  <text x="200" y="218"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="108"
        letter-spacing="-4"
        fill="#2DFF7C">WCT</text>

  <!-- Tagline -->
  <text x="200" y="270"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="13"
        letter-spacing="5"
        fill="#2DFF7C"
        fill-opacity="0.55">TACTICS</text>

  <!-- Corner marks -->
  <line x1="60" y1="95" x2="60" y2="80" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="60" y1="80" x2="75" y2="80" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="340" y1="95" x2="340" y2="80" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="340" y1="80" x2="325" y2="80" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="60" y1="305" x2="60" y2="320" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="60" y1="320" x2="75" y2="320" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="340" y1="305" x2="340" y2="320" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="340" y1="320" x2="325" y2="320" stroke="#2DFF7C" stroke-width="2" stroke-opacity="0.4"/>
</svg>
